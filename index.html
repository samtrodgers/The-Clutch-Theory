<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Clutch Theory | NBA & MLB Blog</title>
    <meta
      name="description"
      content="The Clutch Theory is a simple NBA and MLB blog for sharp, fun, late-game sports analysis."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="The Clutch Theory home">
        <span class="brand-mark">CT</span>
        <span class="brand-copy">
          <strong>The Clutch Theory</strong>
          <small>A sports deepdive</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="#articles">Articles</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-label="The Clutch Theory introduction">
        <img
          src="assets/clutch-theory-hero.png"
          alt="Basketball court blending into a baseball diamond under stadium lights"
        />
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <p class="eyebrow">NBA / MLB</p>
          <h1>The Clutch Theory</h1>
          <p>
            Late-game logic, momentum swings, and the small choices that decide basketball and
            baseball.
          </p>
          <a class="button primary" href="#articles">Read articles</a>
        </div>
      </section>

      <section class="score-strip" aria-label="Coverage focus">
        <span>NBA</span>
        <span>MLB</span>
      </section>

      <section class="article-section" id="articles">
        <div class="section-heading">
          <p class="eyebrow">Latest</p>
          <h2>Articles</h2>
        </div>
        <div class="filter-bar" aria-label="Article filters">
          <button class="filter active" type="button" data-filter="All">All</button>
          <button class="filter" type="button" data-filter="NBA">NBA</button>
          <button class="filter" type="button" data-filter="MLB">MLB</button>
        </div>
        <div class="post-grid" id="postGrid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <strong>The Clutch Theory</strong>
      <span>NBA and MLB analysis for the moments everyone remembers.</span>
    </footer>

    <dialog class="article-dialog" id="articleDialog">
      <button class="close-button" type="button" id="closeDialog" aria-label="Close article">x</button>
      <p class="eyebrow" id="dialogMeta"></p>
      <h2 id="dialogTitle"></h2>
      <p class="dialog-summary" id="dialogSummary"></p>
      <div class="article-body" id="dialogBody"></div>
    </dialog>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
